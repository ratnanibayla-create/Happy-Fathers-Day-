<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Happy Father's Day</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #87ceeb, #f7f7f7);
      text-align: center;
      color: #333;
    }

    header {
      background-color: #001f3f;
      color: white;
      padding: 30px;
    }

    h1 {
      font-size: 45px;
      margin: 10px 0;
    }

    .card {
      background-color: white;
      width: 70%;
      margin: 40px auto;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .tie {
      font-size: 80px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
    }

    button,
    a.nav-button {
      background-color: #87ceeb;
      color: #333;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
    }

    button:hover,
    a.nav-button:hover {
      background-color: #4a9eff;
      color: white;
    }

    footer {
      background-color: #1f3c88;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
  <script>
    let colorState = 0;

    function setPageBackground(state, showConfetti = false) {
      if (state === 0) {
        document.body.style.background = 'linear-gradient(to bottom, #87ceeb, #f7f7f7)';
      } else if (state === 1) {
        document.body.style.background = 'linear-gradient(to bottom, #00ff00, #007700)';
      } else if (state === 2) {
        document.body.style.background = 'linear-gradient(to bottom, #ff1493, #ff69b4)';
      } else {
        document.body.style.background = 'linear-gradient(to bottom, #ff69b4, #ff1493)';
        if (showConfetti) {
          rainConfetti();
        }
      }
    }

    function toggleColor() {
      const currentState = colorState;
      setPageBackground(currentState, true);
      sessionStorage.setItem('backgroundState', currentState);
      colorState = (currentState + 1) % 4;
    }

    function syncBackground() {
      const storedState = sessionStorage.getItem('backgroundState');
      if (storedState !== null) {
        const state = Number(storedState);
        if (!Number.isNaN(state)) {
          setPageBackground(state, false);
          colorState = (state + 1) % 4;
          return;
        }
      }
      setPageBackground(0, false);
      colorState = 1;
    }

    window.addEventListener('DOMContentLoaded', syncBackground);

    function rainConfetti() {
      const confettiCount = 200;
      const confettiEmojis = ['🎊', '✨', '🌟', '💫', '🎊', '✨', '🌟'];
      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
        confetti.style.position = 'fixed';
        confetti.style.pointerEvents = 'none';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = '-40px';
        confetti.style.fontSize = `${Math.floor(Math.random() * 26) + 18}px`;
        confetti.style.opacity = '0';
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        const delay = Math.random() * 1000;
        const duration = 2500 + Math.random() * 1500;
        confetti.style.transition = `transform ${duration}ms ease-out, top ${duration}ms ease-out, opacity ${duration}ms ease-out`;
        document.body.appendChild(confetti);
        setTimeout(() => {
          requestAnimationFrame(() => {
            confetti.style.opacity = '1';
            confetti.style.top = window.innerHeight + 40 + 'px';
            confetti.style.transform = `rotate(${Math.random() * 720 - 360}deg) translateX(${Math.random() * 200 - 100}px)`;
          });
          setTimeout(() => {
            confetti.style.opacity = '0';
          }, duration - 500);
          setTimeout(() => confetti.remove(), duration + 100);
        }, delay);
      }
    }
  </script>
</head>

<body>

  <header>
    <h1>Happy Father's Day!</h1>
    <p>Celebrating the best dad ever</p>
    <button class="nav-button color-button" onclick="toggleColor();">Color Change</button>
    <a class="nav-button" href="all-about-my-dad.html">Next Page</a>
  </header>

  <div class="card">
    <div class="tie">👔</div>
    <h2>Thanks for Everything, Dad!</h2>
    <p>
      You are kind, funny, helpful, and awesome.
      Thank you for always being there and making life better.
    </p>
  </div>

  <footer>
    Made with love for Father's Day 💙
  </footer>

</body>
</html>
