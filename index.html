<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Happy Father's Day</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #87ceeb, #f7f7f7);
      text-align: center;
      color: #333;
    }

    header {
      background-color: #1f3c88;
      color: white;
      padding: 30px;
    }

    h1 {
      font-size: 45px;
      margin: 10px 0;
    }

    .card {
      background-color: white;
      width: 70%;
      margin: 40px auto;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .tie {
      font-size: 80px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
    }

    button,
    a.nav-button {
      background-color: #ffb703;
      color: #333;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
    }

    button:hover,
    a.nav-button:hover {
      background-color: #fb8500;
      color: white;
    }

    footer {
      background-color: #1f3c88;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Happy Father's Day!</h1>
    <p>Celebrating the best dad ever</p>
    <a class="nav-button" href="all-about-my-dad.html">You're the Best!</a>
  </header>

  <div class="card">
    <div class="tie">👔</div>
    <h2>Thanks for Everything, Dad!</h2>
    <p>
      You are kind, funny, helpful, and awesome.
      Thank you for always being there and making life better.
    </p>
  </div>

  <footer>
    Made with love for Father's Day 💙
  </footer>

</body>
</html>
